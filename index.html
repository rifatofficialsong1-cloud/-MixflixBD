<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixFlix BD</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Header Section */
        header { display: flex; align-items: center; padding: 15px; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; }
        .logo-box { display: flex; align-items: center; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; border-radius: 5px; }
        .brand-name { margin-left: 10px; color: #e50914; font-size: 22px; font-weight: bold; letter-spacing: 1px; }

        /* Banner Style */
        .hero-banner { width: 100%; height: 200px; background: linear-gradient(to bottom, transparent, #000), url('https://i.ibb.co.com/tMBzyTpT/1775807206081.png'); background-size: cover; background-position: center; margin-bottom: 20px; }

        /* Category Nav */
        .nav-scroll { display: flex; overflow-x: auto; padding: 10px; gap: 15px; scrollbar-width: none; border-bottom: 1px solid #333; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-item { white-space: nowrap; cursor: pointer; color: #aaa; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: #fff; border-bottom: 2px solid #e50914; padding-bottom: 5px; }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .movie-card { background: #141414; border-radius: 4px; overflow: hidden; transition: transform 0.2s; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        .movie-info { padding: 8px; }
        .movie-title { font-size: 13px; margin: 0; height: 35px; overflow: hidden; color: #fff; }
        .watch-btn { display: block; background: #e50914; color: #fff; text-decoration: none; text-align: center; padding: 8px; font-size: 12px; font-weight: bold; margin-top: 5px; border-radius: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://i.ibb.co.com/tMBzyTpT/1775807206081.png" class="logo-img">
        <span class="brand-name">MixFlix BD</span>
    </div>
</header>

<div class="hero-banner"></div>

<div class="nav-scroll" id="cat-nav">
    <div class="nav-item active" onclick="filterCat('All')">All</div>
    <div class="nav-item" onclick="filterCat('Japanese')">Japanese</div>
    <div class="nav-item" onclick="filterCat('Indonesian')">Indonesian</div>
    <div class="nav-item" onclick="filterCat('Action')">Action</div>
    <div class="nav-item" onclick="filterCat('Romantic')">Romantic</div>
</div>

<div class="movie-grid" id="movie-display"></div>

<script>
    let allMovies = [];

    fetch('movies.json')
    .then(res => res.json())
    .then(data => {
        allMovies = data;
        renderMovies('All');
    });

    function renderMovies(category) {
        const container = document.getElementById('movie-display');
        container.innerHTML = '';
        
        let filtered = (category === 'All') ? allMovies : allMovies.filter(m => m.category.includes(category));

        filtered.forEach(movie => {
            let vId = movie.video_url.split('v=')[1] || movie.video_url.split('/').pop().split('?')[0];
            let embedUrl = `https://www.youtube.com/embed/${vId}`;
            
            container.innerHTML += `
                <div class="movie-card">
                    <img src="${movie.thumbnail}">
                    <div class="movie-info">
                        <p class="movie-title">${movie.title}</p>
                        <a href="${embedUrl}" class="watch-btn">WATCH NOW</a>
                    </div>
                </div>`;
        });
    }

    function filterCat(cat) {
        // Active class toggle
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        renderMovies(cat);
    }
</script>

</body>
</html>
