<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixFlix BD</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; text-align: center; }
        .logo { width: 120px; margin: 15px 0; border-radius: 10px; }
        .category-title { color: #e50914; font-size: 18px; text-align: left; margin: 20px 0 10px 5px; border-left: 4px solid #e50914; padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .movie-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; }
        .movie-card { width: calc(50% - 10px); background: #141414; border-radius: 8px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .movie-card img { width: 100%; height: 200px; object-fit: cover; }
        .movie-card h3 { font-size: 13px; padding: 8px; margin: 0; height: 38px; overflow: hidden; color: #ececec; }
        .play-btn { background: #e50914; color: #fff; text-decoration: none; display: block; padding: 10px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <img src="https://i.ibb.co.com/tMBzyTpT/1775807206081.png" class="logo" alt="MixFlix BD">
    
    <div id="main-content"></div>

    <script>
        fetch('movies.json')
        .then(res => res.json())
        .then(data => {
            let content = document.getElementById('main-content');
            let categories = {};

            // Grouping by category
            data.forEach(movie => {
                if (!categories[movie.category]) {
                    categories[movie.category] = [];
                }
                categories[movie.category].push(movie);
            });

            // Displaying sections
            for (let cat in categories) {
                let section = `<div><h2 class="category-title">${cat}</h2><div class="movie-container">`;
                categories[cat].forEach(movie => {
                    let videoId = movie.video_url.split('v=')[1] || movie.video_url.split('/').pop();
                    let embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    section += `
                        <div class="movie-card">
                            <img src="${movie.thumbnail}">
                            <h3>${movie.title}</h3>
                            <a href="${embedUrl}" class="play-btn">Watch Now</a>
                        </div>`;
                });
                section += `</div></div>`;
                content.innerHTML += section;
            }
        });
    </script>
</body>
</html>
