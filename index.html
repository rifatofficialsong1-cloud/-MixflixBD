<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixFlix BD</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Banner & Nav */
        .hero-banner { width: 100%; height: 220px; background: url('https://i.ibb.co.com/jX5F3MT/file-000000004d3471f88ff72a6cd04f0cf2.png'); background-size: cover; background-position: center; }
        .nav-scroll { display: flex; overflow-x: auto; padding: 15px 10px; gap: 20px; scrollbar-width: none; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-item { white-space: nowrap; cursor: pointer; color: #808080; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: #fff; border-bottom: 3px solid #e50914; padding-bottom: 5px; }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .movie-card { background: #1a1a1a; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .movie-card img { width: 100%; height: 230px; object-fit: cover; }
        .movie-info { padding: 10px; }
        .movie-title { font-size: 13px; margin: 0 0 8px 0; height: 32px; overflow: hidden; color: #e5e5e5; }
        .watch-btn { display: block; background: #e50914; color: #fff; text-decoration: none; text-align: center; padding: 10px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* Full Screen Video Modal - Force Landscape Style */
        #video-modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #000; 
            z-index: 9999; 
        }
        
        /* Rotating the container for full view on mobile */
        .modal-content { 
            width: 100%; height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        
        .close-btn { 
            position: absolute; 
            top: 15px; right: 15px; 
            color: #fff; font-size: 30px; 
            cursor: pointer; z-index: 10001; 
            background: rgba(229, 9, 20, 0.8); 
            width: 40px; height: 40px; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
        }
    </style>
</head>
<body>

<div class="hero-banner"></div>
<div class="nav-scroll" id="cat-nav">
    <div class="nav-item active" onclick="filterCat('All')">All</div>
    <div class="nav-item" onclick="filterCat('Japanese')">Japanese</div>
    <div class="nav-item" onclick="filterCat('Indonesian')">Indonesian</div>
    <div class="nav-item" onclick="filterCat('Korean')">Korean Drama</div>
    <div class="nav-item" onclick="filterCat('Action')">Action</div>
    <div class="nav-item" onclick="filterCat('Romantic')">Romantic</div>
</div>

<div class="movie-grid" id="movie-display"></div>

<div id="video-modal">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <div class="modal-content" id="player-container"></div>
</div>

<script>
    let allMovies = [];
    fetch('movies.json').then(res => res.json()).then(data => { allMovies = data; renderMovies('All'); });

    function renderMovies(category) {
        const container = document.getElementById('movie-display');
        container.innerHTML = '';
        let filtered = (category === 'All') ? allMovies : allMovies.filter(m => m.category.includes(category));
        filtered.forEach(movie => {
            let vId = movie.video_url.split('v=')[1] || movie.video_url.split('/').pop().split('?')[0];
            container.innerHTML += `
                <div class="movie-card">
                    <img src="${movie.thumbnail}" alt="Poster">
                    <div class="movie-info">
                        <p class="movie-title">${movie.title}</p>
                        <div class="watch-btn" onclick="openPlayer('${vId}')">WATCH NOW</div>
                    </div>
                </div>`;
        });
    }

    function openPlayer(id) {
        const modal = document.getElementById('video-modal');
        const container = document.getElementById('player-container');
        
        // embed code with all permissions
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0&fs=1&modestbranding=1" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                allowfullscreen></iframe>`;
        modal.style.display = 'flex';

        // Request full screen for the modal itself
        if (modal.requestFullscreen) {
            modal.requestFullscreen();
        } else if (modal.webkitRequestFullscreen) {
            modal.webkitRequestFullscreen();
        } else if (modal.msRequestFullscreen) {
            modal.msRequestFullscreen();
        }
    }

    function closePlayer() {
        if (document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
        document.getElementById('video-modal').style.display = 'none';
        document.getElementById('player-container').innerHTML = '';
    }

    function filterCat(cat) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderMovies(cat);
    }
</script>

</body>
</html>
