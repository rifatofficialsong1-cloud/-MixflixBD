<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixFlix BD</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header & Logo */
        .header { display: flex; align-items: center; padding: 10px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); position: fixed; width: 100%; z-index: 1000; }
        .logo { width: 45px; height: 45px; object-fit: contain; }
        .brand-name { font-size: 22px; font-weight: bold; color: #e50914; margin-left: 10px; font-family: 'Arial Black', sans-serif; }

        /* Featured Banner */
        .banner { width: 100%; height: 250px; background: url('https://i.ibb.co.com/tMBzyTpT/1775807206081.png') center/cover; position: relative; display: flex; align-items: flex-end; padding-bottom: 20px; box-shadow: inset 0 -50px 50px #000; }
        .banner-text { padding: 20px; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px #000; }

        /* Category Menu */
        .nav-container { white-space: nowrap; overflow-x: auto; padding: 15px 10px; background: #000; scrollbar-width: none; position: sticky; top: 60px; z-index: 999; }
        .nav-container::-webkit-scrollbar { display: none; }
        .nav-btn { display: inline-block; padding: 8px 18px; margin-right: 10px; background: #222; border-radius: 20px; font-size: 14px; cursor: pointer; border: none; color: #fff; transition: 0.3s; }
        .nav-btn.active { background: #e50914; font-weight: bold; }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .movie-card { background: #141414; border-radius: 4px; overflow: hidden; position: relative; transition: 0.3s; }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-info { padding: 8px; font-size: 13px; font-weight: 500; text-align: left; }
        .play-icon { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; opacity: 0.8; }
        
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.ibb.co.com/tMBzyTpT/1775807206081.png" class="logo">
        <span class="brand-name">MixFlix BD</span>
    </div>

    <div class="banner">
        <div class="banner-text">Trending Now: New Updates</div>
    </div>

    <div class="nav-container" id="category-menu">
        <button class="nav-btn active" onclick="filterMovies('All')">All</button>
        <button class="nav-btn" onclick="filterMovies('Japanese Movies')">Japanese</button>
        <button class="nav-btn" onclick="filterMovies('Indonesian Horror')">Indonesian</button>
        <button class="nav-btn" onclick="filterMovies('Korean Drama')">Korean</button>
        <button class="nav-btn" onclick="filterMovies('Action')">Action</button>
        <button class="nav-btn" onclick="filterMovies('Romantic')">Romantic</button>
    </div>

    <div class="movie-grid" id="movie-list"></div>

    <script>
        let allMovies = [];

        fetch('movies.json')
        .then(res => res.json())
        .then(data => {
            allMovies = data;
            displayMovies(allMovies);
        });

        function displayMovies(movies) {
            let list = document.getElementById('movie-list');
            list.innerHTML = "";
            movies.forEach(movie => {
                let videoId = movie.video_url.split('v=')[1] || movie.video_url.split('/').pop().split('?')[0];
                let embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                list.innerHTML += `
                    <a href="${embedUrl}" class="movie-card">
                        <img src="${movie.thumbnail}">
                        <div class="play-icon">▶️</div>
                        <div class="movie-info">${movie.title}</div>
                    </a>`;
            });
        }

        function filterMovies(category) {
            // Update buttons
            let btns = document.querySelectorAll('.nav-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(category === 'All') {
                displayMovies(allMovies);
            } else {
                let filtered = allMovies.filter(m => m.category === category);
                displayMovies(filtered);
            }
        }
    </script>
</body>
</html>
